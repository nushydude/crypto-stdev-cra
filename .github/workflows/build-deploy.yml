name: Increment Build Number, Deploy and Vercel Production Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Increment build number
        run: |
          # Read the current build number
          build_number=$(cat build-number.txt)

          # Increment the build number
          echo $(($build_number + 1)) > build-number.txt

          # Commit and push the change
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add build-number.txt
          git commit -m "Increment build number"
          git push

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: |
          # Install dependencies with legacy peer deps and retry logic
          for i in {1..3}; do
            npm install --legacy-peer-deps && break || sleep 5
          done
          # Build with Vercel
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
